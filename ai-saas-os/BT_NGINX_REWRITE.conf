# Baota Nginx pseudo-static rules for AI SaaS OS / Laravel
# Set the Baota site root to: /www/wwwroot/ai-saas-os/public

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

location ~ /\. {
    deny all;
}

location ~* \.(env|log|sql|bak|backup|ini|conf)$ {
    deny all;
}

location = /favicon.ico {
    log_not_found off;
    access_log off;
}

location = /robots.txt {
    log_not_found off;
    access_log off;
}
